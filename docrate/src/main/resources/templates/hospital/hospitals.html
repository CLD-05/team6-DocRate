<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>병원 목록</title>
    <link rel="stylesheet" th:href="@{/css/hospital/hospitals.css}">
</head>

<body>
    <!-- layout:fragment="content"는 base layout에 정의된 content 블록에 삽입될 부분입니다. -->
    <div layout:fragment="content">
        <main class="container">
            <h1>병원 목록</h1>
            <a th:href="@{/hospitals/request}" class="btn-request">병원 등록 요청하기</a>

            <div class="filters">
                <div class="filter-group">
                    <label for="category">카테고리:</label>
                    <select id="category" name="category">
                        <option value="">전체</option>
                        <!-- 예시: 실제로는 서버에서 동적으로 받아와야 합니다. -->
                        <option th:each="category : ${categories}" th:value="${category.code}" th:text="${category.name}">내과</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="region">지역:</label>
                    <select id="region" name="region">
                        <option value="">전체</option>
                        <!-- 예시: 실제로는 서버에서 동적으로 받아와야 합니다. -->
                        <option th:each="region : ${regions}" th:value="${region.code}" th:text="${region.name}">서울시</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort">정렬:</label>
                    <select id="sort" name="sort">
                        <option value="default">기본</option>
                        <option value="rating_desc">평점순 (높은순)</option>
                        <option value="distance_asc">거리순 (가까운순)</option>
                        <!-- 추가 정렬 옵션 -->
                    </select>
                </div>
                <button class="btn-search">검색</button>
            </div>

            <div class="hospital-list">
                <!-- 병원 목록을 동적으로 표시합니다. -->
                <div th:each="hospital : ${hospitals}" class="hospital-card">
                    <h3 th:text="${hospital.name}">병원명: 서울튼튼내과</h3>
                    <p><strong>주소:</strong> <span th:text="${hospital.address}">서울시 강남구 ...</span></p>
                    <p><strong>전화:</strong> <span th:text="${hospital.phone}">02-1234-5678</span></p>
                    <p><strong>진료분야:</strong> <span th:text="${hospital.department}">내과</span></p>
                    <a th:href="@{/hospitals/{id}(id=${hospital.id})}" class="btn-details">상세보기</a>
                </div>

                <!-- 병원이 없을 경우 표시될 메시지 -->
                <div th:if="${#lists.isEmpty(hospitals)}" class="no-results">
                    검색 조건에 맞는 병원을 찾을 수 없습니다.
                </div>
            </div>

            <div class="pagination">
                <!-- 페이지네이션 컨트롤 -->
                <nav aria-label="Page navigation example">
                    <ul class="pagination justify-content-center">
                        <li class="page-item">
                            <a class="page-link" href="#" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li class="page-item"><a class="page-link" href="#">1</a></li>
                        <li class="page-item"><a class="page-link" href="#">2</a></li>
                        <li class="page-item"><a class="page-link" href="#">3</a></li>
                        <li class="page-item">
                            <a class="page-link" href="#" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </main>
    </div>
</body>
</html>
