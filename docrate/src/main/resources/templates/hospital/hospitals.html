<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병원 검색 | DocRate</title>
    <link rel="stylesheet" href="/css/hospital/hospitals.css">
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="/" class="logo">DOC RATE</a>
    </div>
    <nav class="header-right">
        <a href="/mypage">마이페이지</a>
        <a href="/logout">로그아웃</a>
    </nav>
</header>

<main class="container">
    <!-- 검색 결과 수 -->
    <section class="result-section">
        <h1>검색된 <span th:text="${totalCount}">0</span> 결과</h1>
    </section>

    <!-- 검색 섹션 -->
    <section class="search-section">
        <form method="get" action="/hospitals" class="search-form">
            <div class="search-row">
                <input
                    type="text"
                    name="search"
                    th:value="${search}"
                    placeholder="병원 이름을 입력하세요"
                    class="search-input"
                />
                <button type="submit" class="search-button">검색</button>
            </div>
            <p class="search-guide">
                <a th:href="@{/doctors}" class="hospital-link">의사 이름으로 찾을게요</a>
            </p>
        </form>
    </section>

    <!-- 병원 리스트 섹션 -->
    <section class="hospital-list-section">
        <div class="hospital-list" th:if="${not #lists.isEmpty(hospitals)}">
            <!-- article 전체를 클릭 가능하게 수정 (상세보기 버튼 제거) -->
            <div class="hospital-card-wrapper" th:each="hospital : ${hospitals}" 
                 th:onclick="|location.href='/hospitals/${hospital.id}'|" 
                 style="cursor: pointer;">
                <article class="hospital-card">
                    <p>
                        <strong>병원명:</strong>
                        <span th:text="${hospital.name}">서울튼튼내과</span>
                    </p>
                    <p>
                        <strong>주소:</strong>
                        <span th:text="${hospital.address}">서울시 강남구 ...</span>
                    </p>
                    <p>
                        <strong>전화:</strong>
                        <span th:text="${hospital.phone}">02-1234-5678</span>
                    </p>
                    <p>
                        <strong>진료분야:</strong>
                        <span th:text="${hospital.category}">내과</span>
                    </p>
                </article>
            </div>
        </div>

        <div class="empty-box" th:if="${#lists.isEmpty(hospitals)}">
            <p class="empty-title">검색 결과가 없습니다.</p>
            <p class="empty-desc">찾으시는 병원이 없다면 아래에서 등록 요청을 해보세요.</p>
        </div>
    </section>

    <!-- 페이징 섹션 -->
    <section class="pagination-section" th:if="${page.totalPages > 0}">
        <div class="pagination">
            <!-- 이전 페이지 링크: currentPage - 1 -->
            <a th:if="${currentPage > 1}"
               th:href="@{/hospitals(page=${currentPage - 1}, search=${search})}"
               class="page-btn">
                이전
            </a>

            <!-- 페이지 번호 링크: i + 1 -->
            <span th:each="i : ${#numbers.sequence(
                currentPage - 3 > 0 ? currentPage - 3 : 0,
                currentPage + 1 < page.totalPages - 1 ? currentPage + 1 : page.totalPages - 1
            )}">
                <a th:href="@{/hospitals(page=${i + 1}, search=${search})}"
                   th:text="${i + 1}"
                   th:classappend="${(i + 1) == currentPage} ? ' current' : ''"
                   class="page-number">
                    1
                </a>
            </span>

            <!-- 다음 페이지 링크: currentPage + 1 -->
            <a th:if="${currentPage < page.totalPages}"
               th:href="@{/hospitals(page=${currentPage + 1}, search=${search})}"
               class="page-btn">
                다음
            </a>
        </div>
    </section>

    <!-- 요청 섹션 -->
    <section class="request-section">
        <p class="request-text">
            <a th:href="@{/hospital-requests/new}" class="request-link">
                찾으시는 병원이 없다면 추가할까요?
            </a>
        </p>
    </section>
</main>

</body>
</html>
