<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>병원 목록</title>
</head>
<body>
<h1>병원 목록</h1>

<ul>
    <li th:each="hospital : ${hospitals}">
        <span th:text="${hospital.name}">병원명</span>
        -
        <span th:text="${hospital.category}">카테고리</span>
    </li>
</ul>
</body>
</html>
