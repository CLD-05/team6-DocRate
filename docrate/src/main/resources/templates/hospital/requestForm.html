<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병원 등록 요청 | DocRate</title>
    <link rel="stylesheet" href="/css/hospital/hospitalRequestForm.css">
</head>
<body>

<header class="topbar">
    <a th:href="@{/hospitals}" class="back-link">← 병원 목록으로</a>
    <h1 class="page-title">병원 등록 요청</h1>
</header>

<main class="container" style="max-width: 600px; margin: 40px auto; padding: 0 20px;">
    <h1 style="border-bottom: 2px solid #333; padding-bottom: 10px;">병원 등록 요청</h1>

    <form th:action="@{/hospital-requests}" method="post" style="margin-top: 30px;">
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">병원명</label>
            <div style="border: 1px solid #ddd; padding: 10px;">
                <input type="text" name="name" style="width: 100%; border: none; outline: none;" placeholder="병원명을 입력하세요" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">주소</label>
            <div style="border: 1px solid #ddd; padding: 10px;">
                <input type="text" name="address" style="width: 100%; border: none; outline: none;" placeholder="주소를 입력하세요" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">전화번호</label>
            <div style="border: 1px solid #ddd; padding: 10px;">
                <input type="text" name="phone" style="width: 100%; border: none; outline: none;" placeholder="전화번호를 입력하세요">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 30px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">카테고리</label>
            <div style="border: 1px solid #ddd; padding: 10px;">
                <select name="category" style="width: 100%; border: none; outline: none; background: transparent; cursor: pointer;" required>
                    <option value="" disabled selected>카테고리를 선택하세요</option>
                    <option th:each="cat : ${categoryList}" th:value="${cat}" th:text="${cat}"></option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" style="background: #007bff; color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer;">요청 제출</button>
        </div>
    </form>
</main>

</body>
</html>
