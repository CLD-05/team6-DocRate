<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병원 등록 요청 | DocRate</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" th:href="@{/css/doctor-request-form.css}">
</head>
<body>
<div class="page-wrap">
    <div class="form-shell">
        <header class="topbar">
            <a th:href="@{/hospitals}" class="back-link">← 병원 목록으로</a>
            <h1 class="page-title">병원 등록 요청</h1>
        </header>

        <main class="content">
            <form class="request-form" th:action="@{/hospital-requests}" method="post">

                <div class="form-group">
                    <label class="form-label">병원명</label>
                    <input type="text" name="name" class="form-input" placeholder="병원명을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label class="form-label">주소</label>
                    <input type="text" name="address" class="form-input" placeholder="주소를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label class="form-label">전화번호</label>
                    <input type="text" name="phone" class="form-input" placeholder="전화번호를 입력하세요">
                </div>

                <div class="form-group">
                    <label class="form-label">카테고리</label>
                    <select name="category" class="form-input" required>
                        <option value="" disabled selected>카테고리를 선택하세요</option>
                        <option th:each="cat : ${categoryList}" th:value="${cat}" th:text="${cat}"></option>
                    </select>
                </div>

                <div class="submit-wrap">
                    <button type="submit" class="submit-btn">요청 제출</button>
                </div>
            </form>
        </main>
    </div>
</div>
</body>
</html>
