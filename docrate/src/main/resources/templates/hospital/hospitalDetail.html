<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병원 상세 | DocRate</title>
    <link rel="stylesheet" href="/css/hospital/hospitalDetail.css">
</head>
<body>

<header class="header" style="display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #ddd;">
    <div class="header-left">
        <a href="/" class="logo" style="text-decoration: none; font-weight: bold; font-size: 1.5rem; color: #2c3e50;">DOC RATE</a>
    </div>
    <nav class="header-right" style="display: flex; gap: 15px;">
        <a href="/mypage" style="text-decoration: none; color: #333;">마이페이지</a>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" style="background: none; border: none; cursor: pointer; color: #333; padding: 0;
    font-size: inherit;">로그아웃</button>
        </form>
    </nav>
</header>

<main class="container" style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    <h1 style="border-bottom: 2px solid #333; padding-bottom: 10px;">병원 상세</h1>

    <section class="hospital-info" style="margin-top: 30px; line-height: 2;">
        <p><strong>병원명:</strong> <span th:text="${hospital.name}">서울튼튼내과</span></p>
        <p><strong>주소:</strong> <span th:text="${hospital.address}">서울시 강남구 ...</span></p>
        <p><strong>전화:</strong> <span th:text="${hospital.phone}">02-1234-5678</span></p>
        <p><strong>카테고리:</strong> <span th:text="${hospital.category}">내과</span></p>
        <p><strong>상태:</strong> <span th:text="${hospital.status}">운영중</span></p>
    </section>

    <section class="doctor-list-section" style="margin-top: 40px; border: 1px solid #ddd; padding: 20px;">
        <h3 style="margin-top: 0;">소속 의사 목록</h3>
        <ul style="list-style: none; padding-left: 0;">
            <li th:each="doctor : ${doctors}" style="margin-bottom: 10px;">
                - <span th:text="${doctor.name}">김의사</span> 
                (<span th:text="${doctor.department.name}">내과</span>)
                <a th:href="@{/doctors/{id}(id=${doctor.id})}" style="margin-left: 10px; font-size: 0.9rem; color: #007bff;">상세보기</a>
            </li>
            <li th:if="${#lists.isEmpty(doctors)}" style="color: #888;">등록된 의사가 없습니다.</li>
        </ul>
    </section>

    <div class="navigation-actions" style="margin-top: 40px; text-align: center;">
        <a th:href="@{/hospitals}" class="btn-back" style="display: inline-block; padding: 10px 20px; background: #eee; text-decoration: none; color: #333; border-radius: 5px;">목록으로</a>
        <p style="margin-top: 20px; color: #666;">
            <a th:href="@{/doctor-requests/new}" style="color: #007bff; font-weight: bold; text-decoration: none;">찾으시는 의사가 없다면 추가할까요?</a>
        </p>
    </div>
</main>

</body>
</html>
