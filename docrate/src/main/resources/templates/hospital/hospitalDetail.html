<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병원 상세 | DocRate</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" th:href="@{/css/hospitalDetail.css}">
</head>
<body>
<div class="page-wrap">
    <div class="detail-shell">

        <header class="topbar">
            <div class="brand">
                <a th:href="@{/}">DocRate</a>
            </div>
            <div class="topbar-menu">
                <div th:if="${isLoggedIn}" class="user-menu">
                    <span class="nickname" th:text="${nickname} + '님'">사용자님</span>
                    <a th:href="@{/mypage}" class="top-link-btn">마이페이지</a>
                    <form th:action="@{/logout(redirectUrl=${currentUrl})}" method="post" class="logout-form">
                        <input type="hidden" th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="top-link-btn dark">로그아웃</button>
                    </form>
                </div>
                <div th:if="${!isLoggedIn}" class="guest-menu">
                    <a th:href="@{/login(redirectUrl=${currentUrl})}" class="top-link-btn">로그인</a>
                </div>
            </div>
        </header>

        <main class="content">

            <section class="hero-section">
                <p class="eyebrow">HOSPITAL DETAIL</p>
                <h1 class="page-title" th:text="${hospital.name}">병원명</h1>
            </section>

            <section class="profile-card">
                <div class="info-block">
                    <h3 class="section-title">병원 정보</h3>
                    <div class="info-box">
                        <div class="info-row">
                            <span class="info-label">주소</span>
                            <span class="info-value" th:text="${hospital.address}">서울시 강남구</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">전화</span>
                            <span class="info-value" th:text="${hospital.phone}">02-1234-5678</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">진료분야</span>
                            <span class="info-value" th:text="${hospital.category}">내과</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">운영상태</span>
                            <span class="info-value" th:text="${hospital.status}">운영중</span>
                        </div>
                    </div>
                </div>

                <div class="info-block">
                    <h3 class="section-title">소속 의사 목록</h3>
                    <div class="doctor-list" th:if="${not #lists.isEmpty(doctors)}">
                        <div class="doctor-card" th:each="doctor : ${doctors}">
                            <div class="doctor-info">
                                <span class="doctor-name" th:text="${doctor.name}">김의사</span>
                                <span class="doctor-dept" th:text="${doctor.department.name}">내과</span>
                            </div>
                            <a th:href="@{/doctors/{id}(id=${doctor.id})}" class="detail-btn">상세보기</a>
                        </div>
                    </div>
                    <div class="empty-box" th:if="${#lists.isEmpty(doctors)}">
                        등록된 의사가 없습니다.
                    </div>
                </div>

                <div class="action-row">
                    <a th:href="@{/hospitals}" class="action-btn light">목록으로</a>
                    <a th:href="@{/doctor-requests/new}" class="action-btn dark">의사 추가 요청</a>
                </div>
            </section>

        </main>
    </div>
</div>
</body>
</html>
