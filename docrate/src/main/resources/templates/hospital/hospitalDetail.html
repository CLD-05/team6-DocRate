<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}"> <!-- 레이아웃 파일은 'layout.html'로 가정합니다. -->

<head>
    <title>병원 상세</title>
    <link rel="stylesheet" th:href="@{/css/hospital/hospitalDetail.css}">
</head>

<body>
    <!-- layout:fragment="content"는 base layout에 정의된 content 블록에 삽입될 부분입니다. -->
    <div layout:fragment="content">
        <main class="container">
            <h1>병원 상세</h1>

            <div class="hospital-details">
                <div class="hospital-info">
                    <h2 th:text="${hospital.name}">병원명: 서울튼튼내과</h2>
                    <p><strong>주소:</strong> <span th:text="${hospital.address}">서울시 강남구 ...</span></p>
                    <p><strong>전화:</strong> <span th:text="${hospital.phone}">02-1234-5678</span></p>
                    <p><strong>카테고리:</strong> <span th:text="${hospital.department}">내과</span></p>
                    <!-- 상태는 Enum 또는 String으로 가정하며, display name 등을 사용합니다. -->
                    <p><strong>상태:</strong> <span th:text="${hospital.status.displayName}">운영중</span></p>
                </div>

                <div class="doctor-list-section">
                    <h3>소속 의사 목록</h3>
                    <div class="doctors-container">
                        <!-- 해당 병원에 소속된 의사 목록을 동적으로 표시합니다. -->
                        <div th:if="${#lists.isEmpty(doctors)}" class="no-doctors">
                            해당 병원에 등록된 의사가 없습니다.
                        </div>
                        <div th:each="doctor : ${doctors}" class="doctor-card">
                            <div class="doctor-info">
                                <p><strong>의사명:</strong> <span th:text="${doctor.name}">김의사</span></p>
                                <p><strong>진료과:</strong> <span th:text="${doctor.department}">내과</span></p>
                            </div>
                            <a th:href="@{/doctors/{doctorId}(doctorId=${doctor.id})}" class="btn-view-doctor">상세보기</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="navigation-actions">
                <a th:href="@{/hospitals}" class="btn-back-to-list">목록으로</a>
            </div>
        </main>
    </div>
</body>
</html>
