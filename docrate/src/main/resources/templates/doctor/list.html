<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>의사 검색</title>
    <link rel="stylesheet" href="/css/doctors.css">
</head>
<body>

<header class="header">
    <div class="logo">DOC RATE</div>
    <div class="menu">
        <a href="/mypage">마이페이지</a>
        <a href="/logout">로그아웃</a>
    </div>
</header>

<div class="container">

    <h2>검색된 <span th:text="${totalCount}">0</span> 결과</h2>

    <!-- 검색 -->
    <form method="get" action="/doctors" class="search-box">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="병원 이름으로 찾을게요">
        <button type="submit">검색</button>
    </form>

    <!-- 의사 리스트 -->
    <div class="doctor-list">
        <div class="doctor-card" th:each="doctor : ${doctors}">
            <p><strong>의사명:</strong> <span th:text="${doctor.doctorName}"></span></p>
            <p><strong>병원명:</strong> <span th:text="${doctor.hospitalName}"></span></p>
            <p><strong>진료과:</strong> <span th:text="${doctor.departmentName}"></span></p>

            <a th:href="@{/doctors/{id}(id=${doctor.doctorId})}" class="detail-btn">
                상세보기
            </a>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <div class="pagination">
        <a th:if="${currentPage > 0}"
           th:href="@{/doctors(page=${currentPage - 1}, keyword=${keyword})}">
            이전
        </a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/doctors(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active'">
            </a>
        </span>

        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/doctors(page=${currentPage + 1}, keyword=${keyword})}">
            다음
        </a>
    </div>

</div>

</body>
</html>
