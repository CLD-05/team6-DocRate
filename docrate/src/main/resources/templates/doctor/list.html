<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>의사 검색 결과</title>
    <link rel="stylesheet" href="/css/doctors.css">
</head>
<body>
<div class="app-shell">
    <div class="content-card">
        <header class="app-header">
            <div class="brand">
                <a href="/">DocRate</a>
            </div>
            <div class="header-actions">
                <a class="header-link" href="/mypage">마이페이지</a>
                <a class="header-link" href="/logout">로그아웃</a>
            </div>
        </header>

        <main class="page-body">
            <section class="page-title-section">
                <h1 class="page-title">검색된 <span th:text="${totalCount}">0</span> 결과</h1>
            </section>

            <section class="search-section">
                <form action="/doctors" method="get" class="search-form">
                    <input type="text"
                           name="search"
                           th:value="${search}"
                           placeholder="의사명을 입력하세요">
                    <button type="submit">검색</button>
                </form>

                <p class="search-guide">
                    <a th:href="@{/hospitals}" class="hospital-link">병원 이름으로 찾을게요</a>
                </p>
            </section>

            <section class="doctor-list-section">
                <div th:if="${#lists.isEmpty(doctors)}" class="empty-message">
                    검색 결과가 없습니다.
                </div>

                <a class="doctor-item-link"
                   th:each="doctor : ${doctors}"
                   th:href="@{/doctors/{doctorId}(doctorId=${doctor.doctorId})}">
                    <article class="doctor-item">
                        <div class="doctor-row">
                            <span class="label">의사명:</span>
                            <span th:text="${doctor.doctorName}">김의사</span>
                        </div>
                        <div class="doctor-row">
                            <span class="label">병원명:</span>
                            <span th:text="${doctor.hospitalName != null and doctor.hospitalName != '' ? doctor.hospitalName : '정보 없음'}">서울튼튼내과</span>
                        </div>
                        <div class="doctor-row">
                            <span class="label">진료과:</span>
                            <span th:text="${doctor.departmentName != null and doctor.departmentName != '' ? doctor.departmentName : '정보 없음'}">내과</span>
                        </div>
                        <div class="doctor-row">
                            <span class="label">평균 평점:</span>
                            <span th:text="${doctor.averageRating}">4.6</span>
                        </div>
                    </article>
                </a>
            </section>

            <section class="request-section">
                <p class="request-text">
                    <a th:href="@{/doctor-requests/new}" class="request-link">
                        찾으시는 의사가 없다면 추가할까요?
                    </a>
                </p>
            </section>

            <section class="paging-section" th:if="${totalPages != null and totalPages > 1}">
                <a class="page-button"
                   th:if="${currentPage > 0}"
                   th:href="@{/doctors(page=${currentPage - 1}, size=${size}, search=${search})}">
                    이전
                </a>

                <span th:each="pageNumber : ${#numbers.sequence(startPage, endPage)}">
                    <a class="page-button"
                       th:classappend="${pageNumber == currentPage} ? ' current-page' : ''"
                       th:href="@{/doctors(page=${pageNumber}, size=${size}, search=${search})}"
                       th:text="${pageNumber + 1}">
                        1
                    </a>
                </span>

                <a class="page-button"
                   th:if="${currentPage < totalPages - 1}"
                   th:href="@{/doctors(page=${currentPage + 1}, size=${size}, search=${search})}">
                    다음
                </a>
            </section>
        </main>
    </div>
</div>
</body>
</html>
