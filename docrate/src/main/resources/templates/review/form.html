<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 작성 - DocRate</title>
    <link rel="stylesheet" th:href="@{/css/review-form.css}">
</head>
<body>
<div class="page-wrap">
    <div class="container-shell">
        <header class="header">
            <div class="logo">
                <a th:href="@{/}">DocRate</a>
            </div>

            <div class="header-right">
                <div th:if="${loginUser == null}" class="guest-menu">
                    <a th:href="@{/login}" class="header-link">로그인</a>
                    <a th:href="@{/signup}" class="header-btn">회원가입</a>
                </div>

                <div th:if="${loginUser != null}" class="user-menu">
                    <span class="welcome-text" th:text="${loginUser.nickname} + '님'">사용자님</span>
                    <a th:href="@{/mypage}" class="header-link">마이페이지</a>

                    <form th:action="@{/logout}" method="post" class="logout-form">
                        <input type="hidden"
                               th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />
                        <button type="submit" class="logout-btn">로그아웃</button>
                    </form>
                </div>
            </div>
        </header>

        <main class="form-container">
            <section class="page-header">
                <h2 th:text="${review != null} ? '리뷰 수정' : '리뷰 작성'">리뷰 작성</h2>
                <hr class="header-divider">

                <div class="doctor-info-bar">
                    <span class="info-label">의사명:</span>
                    <span class="info-value" th:text="${doctor.name}">김의사</span>
                    <span class="info-separator">/</span>
                    <span class="info-value" th:text="${doctor.hospital.name}">서울튼튼내과</span>
                </div>
            </section>

            <form th:action="${review != null} ? @{/reviews/{id}/edit(id=${review.id})} : @{/doctors/{id}/reviews(id=${doctor.id})}"
                  method="post"
                  th:object="${reviewCreateRequest}">

                <input type="hidden" name="doctorId" th:value="${doctor.id}">

                <div class="form-group rating-section">
                    <label>종합 평점 (세부 점수에 따라 자동 계산됨)</label>
                    <div class="rating-options rating-readonly" style="pointer-events: none;">
                        <input type="radio" name="rating" id="rate5" value="5.0"
                               th:checked="${review != null ? review.rating == 5.0 : true}">
                        <label for="rate5">5</label>

                        <input type="radio" name="rating" id="rate4" value="4.0"
                               th:checked="${review != null ? review.rating == 4.0 : false}">
                        <label for="rate4">4</label>

                        <input type="radio" name="rating" id="rate3" value="3.0"
                               th:checked="${review != null ? review.rating == 3.0 : false}">
                        <label for="rate3">3</label>

                        <input type="radio" name="rating" id="rate2" value="2.0"
                               th:checked="${review != null ? review.rating == 2.0 : false}">
                        <label for="rate2">2</label>

                        <input type="radio" name="rating" id="rate1" value="1.0"
                               th:checked="${review != null ? review.rating == 1.0 : false}">
                        <label for="rate1">1</label>
                    </div>
                </div>

                <hr class="section-divider">

                <div class="detail-ratings-grid">
                    <div class="form-group detail-row">
                        <label>친절도 (1~5)</label>
                        <div class="rating-options detail-selection">
                            <input type="radio" name="bedsideManner" id="manner5" value="5"
                                   th:checked="${review != null ? review.bedsideManner == 5 : true}">
                            <label for="manner5">5</label>

                            <input type="radio" name="bedsideManner" id="manner4" value="4"
                                   th:checked="${review != null ? review.bedsideManner == 4 : false}">
                            <label for="manner4">4</label>

                            <input type="radio" name="bedsideManner" id="manner3" value="3"
                                   th:checked="${review != null ? review.bedsideManner == 3 : false}">
                            <label for="manner3">3</label>

                            <input type="radio" name="bedsideManner" id="manner2" value="2"
                                   th:checked="${review != null ? review.bedsideManner == 2 : false}">
                            <label for="manner2">2</label>

                            <input type="radio" name="bedsideManner" id="manner1" value="1"
                                   th:checked="${review != null ? review.bedsideManner == 1 : false}">
                            <label for="manner1">1</label>
                        </div>
                    </div>

                    <div class="form-group detail-row">
                        <label>설명력 (1~5)</label>
                        <div class="rating-options detail-selection">
                            <input type="radio" name="explanation" id="exp5" value="5"
                                   th:checked="${review != null ? review.explanation == 5 : true}">
                            <label for="exp5">5</label>

                            <input type="radio" name="explanation" id="exp4" value="4"
                                   th:checked="${review != null ? review.explanation == 4 : false}">
                            <label for="exp4">4</label>

                            <input type="radio" name="explanation" id="exp3" value="3"
                                   th:checked="${review != null ? review.explanation == 3 : false}">
                            <label for="exp3">3</label>

                            <input type="radio" name="explanation" id="exp2" value="2"
                                   th:checked="${review != null ? review.explanation == 2 : false}">
                            <label for="exp2">2</label>

                            <input type="radio" name="explanation" id="exp1" value="1"
                                   th:checked="${review != null ? review.explanation == 1 : false}">
                            <label for="exp1">1</label>
                        </div>
                    </div>

                    <div class="form-group detail-row">
                        <label>대기 만족도 (1~5)</label>
                        <div class="rating-options detail-selection">
                            <input type="radio" name="waitTime" id="wait5" value="5"
                                   th:checked="${review != null ? review.waitTime == 5 : true}">
                            <label for="wait5">5</label>

                            <input type="radio" name="waitTime" id="wait4" value="4"
                                   th:checked="${review != null ? review.waitTime == 4 : false}">
                            <label for="wait4">4</label>

                            <input type="radio" name="waitTime" id="wait3" value="3"
                                   th:checked="${review != null ? review.waitTime == 3 : false}">
                            <label for="wait3">3</label>

                            <input type="radio" name="waitTime" id="wait2" value="2"
                                   th:checked="${review != null ? review.waitTime == 2 : false}">
                            <label for="wait2">2</label>

                            <input type="radio" name="waitTime" id="wait1" value="1"
                                   th:checked="${review != null ? review.waitTime == 1 : false}">
                            <label for="wait1">1</label>
                        </div>
                    </div>
                </div>

                <hr class="section-divider">

                <div class="form-group revisit-section">
                    <label>재방문 의사</label>
                    <div class="radio-group-modern">
                        <input type="radio" id="revisit-true" name="revisitIntention" value="true"
                               th:checked="${review != null ? review.revisitIntention == true : true}">
                        <label for="revisit-true" class="radio-btn-label">예</label>

                        <input type="radio" id="revisit-false" name="revisitIntention" value="false"
                               th:checked="${review != null ? review.revisitIntention == false : false}">
                        <label for="revisit-false" class="radio-btn-label">아니오</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>리뷰 내용</label>
                    <textarea name="content"
                              placeholder="솔직한 후기를 입력해주세요 (진료 과정, 태도 등)"
                              required
                              th:text="${review != null ? review.content : ''}"></textarea>
                </div>

                <div class="button-group-modern">
                    <button type="submit"
                            class="btn-save"
                            th:text="${review != null} ? '수정 완료' : '저장'">저장</button>
                    <a th:href="@{/doctors/{id}/reviews(id=${doctor.id})}" class="btn-cancel">취소</a>
                </div>
            </form>
        </main>
    </div>
</div>
</body>

<script>
    // 모든 세부 항목 라디오 버튼에 이벤트 리스너 등록
    document.querySelectorAll('.detail-selection input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', calculateAverage);
    });

    function calculateAverage() {
        // 각 그룹에서 체크된 값들만 가져오기
        const manner = document.querySelector('input[name="bedsideManner"]:checked').value;
        const explanation = document.querySelector('input[name="explanation"]:checked').value;
        const waitTime = document.querySelector('input[name="waitTime"]:checked').value;

        // 평균 계산 후 반올림
        const total = parseInt(manner) + parseInt(explanation) + parseInt(waitTime);
        const avg = Math.round(total / 3);

        // 종합 평점 라디오 버튼 자동 체크
        const ratingRadio = document.getElementById('rate' + avg);
        if (ratingRadio) {
            ratingRadio.checked = true;
        }
    }

    // 초기 실행
    window.onload = function() {
      // 신규 작성일 때만(내용이 비어있을 때만) 초기 계산 실행
      const content = document.querySelector('textarea[name="content"]').value;
      if(!content) {
          calculateAverage();
      } 
    };
</script>
</html>
