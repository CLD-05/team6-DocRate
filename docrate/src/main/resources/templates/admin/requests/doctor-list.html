<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>의사 등록 관리자 페이지</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: sans-serif; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
        tr:hover { background-color: #f1f1f1; }
        .btn-approve { background-color: #28a745; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        .btn-reject { background-color: #dc3545; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.85em; font-weight: bold; background: #eee; }
    </style>
</head>
<body>
    <div style="padding: 20px;">
        <h1>👨‍⚕️ 의사 등록 요청 관리</h1>
        <button onclick="location.reload()" style="padding: 10px 15px; cursor: pointer;">🔄 목록 새로고침</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>신청자</th>
                    <th>병원 / 진료과</th>
                    <th>의사명</th>
                    <th>상태</th>
                    <th>관리 액션</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(requests)}">
                    <td colspan="6" style="text-align: center; color: #888; padding: 40px;">대기 중인 등록 요청이 없습니다.</td>
                </tr>
                
                <tr th:each="req : ${requests}">
                    <td th:text="${req.id}">1</td>
                    <td th:text="${req.requesterNickname ?: '알 수 없음'}">신청자</td>
                    <td>
                        <b th:text="${req.hospitalName}">병원명</b> / 
                        <span th:text="${req.departmentName}">진료과</span>
                    </td>
                    <td th:text="${req.doctorName}">의사명</td>
                    <td>
                        <span class="status-badge" th:text="${req.status}">PENDING</span>
                    </td>
                    <td>
                        <button class="btn-approve" 
                                th:data-id="${req.id}" 
                                onclick="approveRequest(this.getAttribute('data-id'))">승인</button>
                        
                        <button class="btn-reject" 
                                th:data-id="${req.id}" 
                                onclick="rejectRequest(this.getAttribute('data-id'))">거절</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">
        // 승인 API 호출
        async function approveRequest(id) {
            if (!confirm(id + "번 요청을 승인하시겠습니까?")) return;
            
            try {
                const response = await fetch(`/api/admin/doctor-requests/${id}/approve`, {
                    method: 'PATCH'
                });
                
                if (response.ok) {
                    alert("성공적으로 승인되었습니다.");
                    location.reload();
                } else {
                    const errorMsg = await response.text();
                    alert("승인 실패: " + errorMsg);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("서버와 통신 중 오류가 발생했습니다.");
            }
        }

        // 거절 API 호출
        async function rejectRequest(id) {
            const reason = prompt("거절 사유를 입력해주세요:");
            if (!reason) return;

            try {
                const response = await fetch(`/api/admin/doctor-requests/${id}/reject`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason: reason })
                });

                if (response.ok) {
                    alert("거절 처리가 완료되었습니다.");
                    location.reload();
                } else {
                    alert("거절 처리 실패");
                }
            } catch (error) {
                alert("오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
