<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 병원 등록 요청 관리</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-approve { background-color: #28a745; }
        .btn-reject { background-color: #dc3545; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.9em; }
        .PENDING { background-color: #fff3cd; color: #856404; }
        .APPROVED { background-color: #d4edda; color: #155724; }
        .REJECTED { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h1>🏥 병원 등록 요청 목록</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>병원명</th>
                <th>주소</th>
                <th>카테고리</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="${request.id}">1</td>
                <td th:text="${request.name}">서울병원</td>
                <td th:text="${request.address}">서울시 강남구...</td>
                <td th:text="${request.category}">내과</td>
                <td>
                    <span th:class="'status-badge ' + ${request.status}" th:text="${request.status}">PENDING</span>
                </td>
                <td>
                    <div th:if="${request.status.name() == 'PENDING'}">
                        <button class="btn btn-approve" th:onclick="'handleRequest(' + ${request.id} + ', \'approve\')'">승인</button>
                        <button class="btn btn-reject" th:onclick="'handleRequest(' + ${request.id} + ', \'reject\')'">거절</button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <script>
        function handleRequest(id, action) {
            if (!confirm(`정말 이 요청을 ${action === 'approve' ? '승인' : '거절'}하시겠습니까?`)) return;

            // 우리가 만든 API 호출
            fetch(`/api/admin/hospitals-requests/${id}/${action}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    alert('성공적으로 처리되었습니다.');
                    location.reload(); // 처리 후 화면 새로고침
                } else {
                    alert('처리 중 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('서버와 통신에 실패했습니다.');
            });
        }
    </script>
</body>
</html>
