<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 의사 등록 요청 관리</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; background-color: #007bff; }
        .btn:hover { background-color: #0056b3; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.9em; }
        .PENDING { background-color: #fff3cd; color: #856404; }
        .APPROVED { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <h1>👨‍⚕️ 의사 등록 요청 목록</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>의사명</th>
                <th>소속 병원</th>
                <th>진료과</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="request : ${requests}">
                <td th:text="${request.id}">1</td>
                <td th:text="${request.name}">홍길동</td>
                <td th:text="${request.hospital.name}">서울병원</td>
                <td th:text="${request.department.name}">내과</td>
                <td>
                    <span th:class="'status-badge ' + ${request.status}" th:text="${request.status}">PENDING</span>
                </td>
                <td>
                    <button th:if="${request.status.name() == 'PENDING'}" 
                            class="btn" 
                            th:onclick="'handleRequest(' + ${request.id} + ', \'approve\')'">승인</button>
                </td>
            </tr>
        </tbody>
    </table>

    <script>
        function handleRequest(id, action) {
            if (!confirm(`해당 의사 등록 요청을 ${action === 'approve' ? '승인' : '거절'}하시겠습니까?`)) return;

            // 의사 전용 API 주소로 호출
            fetch(`/api/admin/doctor-requests/${id}/${action}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    alert('성공적으로 처리되었습니다.');
                    location.reload(); // 화면 새로고침
                } else {
                    alert('처리 중 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('서버와 통신에 실패했습니다.');
            });
        }
    </script>
</body>
</html>
