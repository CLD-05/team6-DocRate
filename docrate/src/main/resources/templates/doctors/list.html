<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>의사 목록 | DocRate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/doctor-list.css}">
</head>
<body>
<div class="page-wrap">
    <div class="list-shell">

        <header class="topbar">
            <div class="brand">
                <a th:href="@{/}">DocRate</a>
            </div>
        </header>

        <main class="content">
            <section class="hero-section">
                <p class="eyebrow">DOCTOR LIST</p>
                <h1 class="page-title">의사 목록</h1>
                <p class="page-desc">검색 결과와 전체 의사 목록을 확인해보세요.</p>
            </section>

            <section class="search-section">
                <form th:action="@{/doctors}" method="get" class="search-form">
                    <input type="text"
                           name="search"
                           class="search-input"
                           th:value="${search}"
                           placeholder="의사 이름을 입력하세요">
                    <button type="submit" class="search-btn">검색</button>
                </form>
            </section>

            <section class="result-section">
                <div class="result-head">
                    <h2 class="section-title">검색 결과</h2>
                    <p class="result-count">
                        총 <span th:text="${doctorPage.totalElements}">0</span>건
                    </p>
                </div>

                <div class="doctor-list" th:if="${doctorList != null and !#lists.isEmpty(doctorList)}">
                    <article class="doctor-card" th:each="doctor : ${doctorList}">
                        <div class="card-main">
                            <div class="title-row">
                                <h3 class="doctor-name" th:text="${doctor.name}">김의사</h3>
                                <span class="department-badge" th:text="${doctor.departmentName}">내과</span>
                            </div>

                            <p class="doctor-hospital" th:text="${doctor.hospitalName}">서울병원</p>
                            <p class="doctor-intro"
                               th:text="${doctor.intro != null and !doctor.intro.isEmpty() ? doctor.intro : '소개 정보가 없습니다.'}">
                                소개 정보가 없습니다.
                            </p>
                        </div>

                        <a th:href="@{'/doctors/' + ${doctor.id}}" class="detail-link">상세 보기</a>
                    </article>
                </div>

                <div class="empty-box" th:if="${doctorList == null or #lists.isEmpty(doctorList)}">
                    검색 결과가 없습니다.
                </div>
            </section>

            <nav class="pagination" th:if="${doctorPage.totalPages > 1}">
                <a class="page-btn"
                   th:if="${doctorPage.hasPrevious()}"
                   th:href="@{/doctors(page=${doctorPage.number - 1}, search=${search})}">
                    이전
                </a>

                <span class="page-info">
                    <span th:text="${doctorPage.number + 1}">1</span>
                    /
                    <span th:text="${doctorPage.totalPages}">1</span>
                </span>

                <a class="page-btn"
                   th:if="${doctorPage.hasNext()}"
                   th:href="@{/doctors(page=${doctorPage.number + 1}, search=${search})}">
                    다음
                </a>
            </nav>
        </main>
    </div>
</div>
</body>
</html>
