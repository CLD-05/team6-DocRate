<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병원 검색 | DocRate</title>
    <link rel="stylesheet" href="/css/hospitals.css"> <!-- Assuming a separate CSS for hospitals -->
</head>

<body>

<header class="header">
    <div class="header-left">
        <a href="/" class="logo">DOC RATE</a>
    </div>
    <nav class="header-right">
        <!-- 
            JWT 인증 상태에 따라 로그인/마이페이지/로그아웃 메뉴를 조건부로 표시해야 합니다.
            현재는 사용자 요청에 따라 JWT 관련 동적 로직 구현은 보류하고,
            와이어프레임에 명시된 링크 구조와 기본 상태(로그아웃 상태)를 우선 반영합니다.
            
            - 로그인 상태 시: <a href="/mypage">마이페이지</a>, <a href="/logout">로그아웃</a>
            - 로그아웃 상태 시: <a href="/login">로그인</a>, <a href="/signup">회원가입</a>
            
            실제 동적 전환은 추후 JWT 상태 감지 로직이 추가되면 구현됩니다.
         -->
        <!-- 기본값: 로그아웃 상태 (와이어프레임 참고) -->
        <a href="/login">로그인</a>
        <a href="/signup">회원가입</a>

        <!-- 
            로그인 후에는 위의 링크 대신 아래와 같이 표시될 것입니다.
            <a href="/mypage">마이페이지</a>
            <a href="/logout">로그아웃</a> 
        -->
    </nav>
</header>

<main class="container">

    <!-- 검색 결과 -->
    <section class="result-section">
        <h1>검색된 <span th:text="${totalCount}">0</span> 결과</h1>
    </section>

    <!-- 검색 -->
    <section class="search-section">
        <!-- 병원 검색 와이어프레임에 맞춰 수정 -->
        <form method="get" action="/hospitals" class="search-form">
            <div class="search-row">
                <input
                    type="text"
                    name="search"
                    th:value="${search}"
                    placeholder="병원 이름을 입력하세요"
                    class="search-input"
                />
                <button type="submit" class="search-button">검색</button>
            </div>
            <p class="search-guide">
                <!-- 와이어프레임에 의사 목록으로 가는 링크가 있어 그대로 반영 -->
                <a th:href="@{/doctors}" class="doctor-link">
                    의사 이름으로 찾을게요
                </a>
            </p>
        </form>
    </section>

    <!-- 병원 리스트 -->
    <section class="hospital-list-section">
        <div class="hospital-list" th:if="${not #lists.isEmpty(hospitals)}">
            <article class="hospital-card" th:each="hospital : ${hospitals}">
                <h3 class="hospital-name" th:text="${hospital.name}">서울튼튼내과</h3>
                <p class="hospital-address">주소: <span th:text="${hospital.address}">서울시 강남구 ...</span></p>
                <p class="hospital-phone">전화: <span th:text="${hospital.phone}">02-1234-5678</span></p>
                <p class="hospital-field">진료분야: <span th:text="${hospital.category}">내과</span></p>

                <a th:href="@{/hospitals/{hospitalId}(hospitalId=${hospital.id})}" class="detail-link">
                    상세보기
                </a>
            </article>
        </div>

        <!-- empty -->
        <div class="empty-box" th:if="${#lists.isEmpty(hospitals)}">
            <p class="empty-title">검색 결과가 없습니다.</p>
            <p class="empty-desc">찾으시는 병원이 없다면 아래에서 등록 요청을 해보세요.</p>
        </div>
    </section>

    <!-- 페이징 (병원 목록에 맞게 수정) -->
    <section class="pagination-section" th:if="${totalPages > 0}">
        <div class="pagination">
            <a th:if="${currentPage > 0}"
               th:href="@{/hospitals(page=${currentPage - 1}, size=${size}, search=${search})}"
               class="page-btn">
                이전
            </a>

            <span th:each="i : ${#numbers.sequence(
                currentPage - 2 > 0 ? currentPage - 2 : 0,
                currentPage + 2 < totalPages - 1 ? currentPage + 2 : totalPages - 1
            )}">
                <a th:href="@{/hospitals(page=${i}, size=${size}, search=${search})}"
                   th:text="${i + 1}"
                   th:classappend="${i == currentPage} ? ' current' : ''"
                   class="page-number">
                </a>
            </span>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/hospitals(page=${currentPage + 1}, size=${size}, search=${search})}"
               class="page-btn">
                다음
            </a>
        </div>
    </section>

    <!-- 요청 -->
    <section class="request-section">
        <p class="request-text">
            <a th:href="@{/hospital-requests/new}" class="request-link">
                찾으시는 병원이 없다면 추가할까요?
            </a>
        </p>
    </section>

</main>

</body>
</html>
